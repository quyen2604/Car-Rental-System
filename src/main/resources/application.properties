# ==========================================
# CẤU HÌNH H2 DATABASE (CHẠY TRÊN RAM)
# ==========================================
spring.datasource.url=jdbc:h2:mem:car_rental_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Cấu hình JPA / Hibernate tự động sinh bảng
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Bật giao diện quản lý H2 Console công khai
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Tắt tạm Spring Security mới push của sếp để đỡ bị chặn màn hình login/404
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration