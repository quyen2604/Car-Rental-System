<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm Kiếm Xe - Hệ Thống Thuê Xe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">🚙 CarRental</a>
        <div class="nav-links">
            <a href="/">Trang Chủ</a>
            <a href="/search.html" style="color:var(--primary-color);">Thuê Xe</a>
            <a href="/login.html" class="btn btn-outline" style="padding:0.4rem 1rem;">Đăng Nhập</a>
        </div>
    </nav>

    <div class="search-container">
        <div class="search-header">
            <h1 style="font-size:2.5rem; margin-bottom:0.5rem;">Tìm xe ưng ý cho chuyến đi của bạn</h1>
            <p style="color:var(--text-muted);">Hàng trăm dòng xe ô tô & xe máy đang chờ bạn khám phá</p>
        </div>

        <div class="search-box">
            <div class="form-group">
                <label for="type">Loại xe</label>
                <select id="type" class="form-control">
                    <option value="">Tất cả các loại</option>
                    <option value="car">Ô Tô</option>
                    <option value="motorbike">Xe Máy</option>
                </select>
            </div>
            <div class="form-group">
                <label for="location">Vị trí nhận xe</label>
                <input type="text" id="location" class="form-control" placeholder="VD: Hà Nội, TP.HCM, Đà Nẵng...">
            </div>
            <div class="form-group" style="flex: 0 0 auto; min-width:auto;">
                <button onclick="searchVehicles()" class="btn btn-primary" style="height:45px; padding:0 2rem;">🔍 Tìm Kiếm</button>
            </div>
        </div>

        <div id="results" class="results-grid">
            <!-- JavaScript sẽ render danh sách xe vào đây -->
            <div style="grid-column: 1 / -1; text-align: center; padding: 3rem;">
                <div style="display:inline-block; width:40px; height:40px; border:3px solid #f3f3f3; border-top:3px solid var(--primary-color); border-radius:50%; animation:spin 1s linear infinite;"></div>
                <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
                <p style="margin-top:1rem; color:var(--text-muted);">Đang tải dữ liệu...</p>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
